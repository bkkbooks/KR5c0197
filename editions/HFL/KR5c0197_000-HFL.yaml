body:
  text: 正一敕壇儀正一醮宅儀正一醮墓儀正一敕壇儀夫敕壇先辦水劒安地户上具壇簡行道就劎水所先存思本師在西次存思三將軍次存思有一眞官絳衣乘斗而至乃啓白臣聞調隂陽者莫過乎百靈濟家國者豈逾於大道故碧落有災祥之變令人則之黄籙有拯拔之科令人修之臣雖不材竊慕玄化忝佩法籙叨稱治官所歷山川敢忘報效以今太歳某月朔某日辰謹於某州某縣郷里領行法事道士若干人謹爲大道弟子某爲某事修建某齋幾日幾夜禳災却禍請福祈恩建立壇場依科關奏臣等澡鍊形炁棲心靜神克期奉行敢不上聞伏惟太上布維新之令開覆育之恩敕下眞官分司降鑒使煙雲暫息於三界風雨無施於四冥懴謝必聞啓傳無間臣等不勝慊切之至專思神念眞伏待報應次存思報應畢又存四靈畢便過壇簡與他人次垂手握固召四靈東方青龍角亢之精吐雲鬱炁噉雷發聲飛翔八極周遊四冥來立吾左南方朱雀衆禽之長丹穴化生碧霄流響竒彩五色神儀六象來導吾前西方白獸上應觜參英英素質肅肅清音威懾衆獸嘯動山林來侍吾右北方玄武太隂化生虚危表質龜蛇合形盤遊九地統攝百靈來從吾後次收兩手捧心二足丁字立呪曰吾召百神百神旣集即當遊帶日挾月行九州十六神將爲吾使天官地官水官同其休次三才歩就劒水右手執劒呪曰五行所運火木水土金我佩剛劒禁敕鬼神二十八宿隨吾指陳北斗七星挟輔靈眞周流萬方百福同臻次左手執水椀呪曰江河淮海非臣水五龍吐出清天地大帝服之三萬年令日吾將淨祅氣急急如律令次劒水相向稱名位泰玄都正一平炁係天師某治某炁祭酒赤天三五歩綱元命眞人臣某謹請東方青帝青龍銜符帶劒入吾水中謹請南方赤帝赤龍銜符帶劒入吾水中謹請西方白帝白龍銜符帶劒入吾水中謹請北方黒帝黑龍銜符帶劒入吾水中謹請中央黄帝黄龍銜符帶劒入吾水中吾水非常之水五龍五星眞氣之水吾劒非凡之劒九鍊堅剛七星挾傍踏躡北斗跨踞魁罡太一作水周流萬方清無過水濁無過穢以清治濁以水治穢急急如太上老君律令攝噀水次法師行至天門少立存思四靈訖便誦禹歩呪乾尊曜靈坤順内營二儀交泰要合利貞配天享地永寜肅清應感玄黄上衣下裳震離坎兊翼賛抶將乾坤艮巽虎歩龍驤天門地户人門鬼門衞我者誰昊天是蒼今日禹歩上應天綱鬼神賓伏下辟不祥所求知願應時靈光急急如律令次至東北角面東請青童君謹請東方青童君身長九千萬丈從官九千萬人乘東方歳星之精眞炁浮空而來降臨壇所行神布炁搜索邪精驅除鬼賊有罪無赦攝噀水次禹歩至吏南角噀水喝攝面南請赤童君謹請南方赤童君身長三千萬丈從官三千萬人乘南方熒惑星之精眞炁浮空而來降臨壇所行神布炁搜索邪精焚燒鬼賊有罪無赦攝噀水次禹歩至西南角噀水攝面西請白童君謹請西方白童君身長七千萬丈從官七千萬人乘西方太白星之精眞炁浮空而來降臨壇所行神布炁搜索邪精誅斬鬼賊有罪無赦攝噀水次禹歩至西北角噀水攝面北請黒童君謹請北方黒童君身長五千萬丈從官五千萬人乘北方辰星之精眞炁浮空而來降臨壇所行神布炁搜索邪精漂蕩鬼賊有罪無赦攝噀水次禹歩至于上方噀水攝面北請黄童君謹請中央黄童君身長一十二萬丈從官一十二萬人乘中兵鎭星之精眞炁浮空而來降臨壇所行神布炁搜索邪精埋藏鬼賊有罪無赦攝噀水次徃鬼門上或地戸上歩七星背建向破旋身八斗中衣斗履斗存天官兵馬日月星宿神仙五嶽四瀆兵馬各九億萬衆森然在目前及青龍白虎朱雀玄武並羅列左右即再啓事次重稱法位太玄都正一平炁係天師某治某炁祭酒赤天三五歩綱元命眞人臣某等奉爲大道弟子某修建某齋幾日幾夜祈恩謝過請福禳災上請天仙兵馬九億萬衆地仙兵馬九億萬衆日月星宿兵馬九億萬衆神仙兵馬九億萬衆五嶽四瀆兵馬九億萬衆各請嚴振落驛風驟雷舉雨沸雲奔一合來下克以今日今時齊到此處蓋屋三重繞壇三帀上張天羅下布地網九土齊功兵馬列陣於壇場之内門戸之傍井竈之間花果之下所有伏屍故氣土木百精猫鬼野道生人厭蠱爲害鬼賊於道不順者收付魁罡之下入地萬丈無動無作急急如律令攝噀水次視劒五行呪曰五行相推剛最持威六紀輔我三台辟非天迴地轉隂陽開闢長生度世日月同暉次提劒擬地視之呪曰天赦煌煌地赦正方禹歩所至百鬼伏藏急急如律令攝噀水便殺劒後便右旋身出斗避踏星罡畢就事行道正一敕壇儀
